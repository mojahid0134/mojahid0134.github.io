<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post View</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Roboto, sans-serif; }
  html, body { height:100%; }

  .topbar {
    background:linear-gradient(135deg,#1A1A2E,#16213E);
    color:#fff; padding:14px 16px; display:flex; align-items:center; gap:12px;
    position:fixed; top:0; left:0; right:0; height:52px; z-index:10;
  }
  .back-btn {
    background:rgba(255,255,255,0.15); border:none; color:#fff;
    width:34px; height:34px; border-radius:50%; font-size:18px;
    display:flex; align-items:center; justify-content:center;
  }
  .page-title {
    font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    max-width:calc(100% - 60px);
  }

  .content-frame {
    position:fixed; top:52px; left:0; right:0; bottom:0;
    width:100%; height:calc(100% - 52px); border:none;
  }

  .loading {
    position:fixed; top:52px; left:0; right:0; bottom:0;
    display:flex; align-items:center; justify-content:center;
    color:#999; font-size:14px;
  }

  /* Install Prompt Screen */
  .install-screen {
    position:fixed; top:0; left:0; right:0; bottom:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:30px; text-align:center; background:#f4f5f7;
  }
  .install-screen h2 { color:#1A1A2E; font-size:20px; margin-bottom:12px; }
  .install-screen p { color:#555; font-size:14px; margin-bottom:24px; line-height:1.5; }
  .install-btn {
    background:linear-gradient(135deg,#1A1A2E,#16213E); color:#fff;
    border:none; padding:14px 32px; border-radius:30px;
    font-size:15px; font-weight:600;
  }
</style>
</head>
<body>

<script>
  // ================================
  // App পাবলিশ হওয়ার পর, এখানে আসল Play Store Link বসাবি
  // ================================
  const PLAYSTORE_LINK = "https://play.google.com/store/apps/details?id=com.yourname.streamfeed";

  const params = new URLSearchParams(window.location.search);
  const url = params.get('url');
  const title = params.get('title');
  const postId = params.get('id');
  const isAppMode = params.get('app') === '1';

  if (!isAppMode) {
    // App এর বাইরে (Browser এ) খোলা হয়েছে — Install Prompt দেখাও
    document.body.innerHTML = `
      <div class="install-screen">
        <h2>📱 Install the App</h2>
        <p>To view this post, please install our app from Google Play Store.</p>
        <button class="install-btn" onclick="window.location.href='${PLAYSTORE_LINK}'">Install App</button>
      </div>
    `;
  } else {
    // App এর ভিতর থেকে খোলা হয়েছে — Post দেখাও + History তে সেভ কর
    document.body.innerHTML = `
      <div class="topbar">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="page-title">${title || 'Loading...'}</div>
      </div>
      <div class="loading" id="loadingMsg">Loading post...</div>
      <iframe class="content-frame" id="contentFrame" style="display:none;"></iframe>
    `;

    if (postId) {
      addToHistory(postId);
    }

    if (url) {
      const frame = document.getElementById('contentFrame');
      frame.src = url;
      frame.onload = () => {
        document.getElementById('loadingMsg').style.display = 'none';
        frame.style.display = 'block';
      };
    } else {
      document.getElementById('loadingMsg').innerText = 'No link found.';
    }
  }

  // ---- Visit History তে যোগ করা (এই ফোনেই সেভ থাকবে) ----
  function addToHistory(id) {
    let history = JSON.parse(localStorage.getItem('visitHistory') || '[]');
    history = history.filter(h => h !== id);   // আগে থাকলে সরিয়ে
    history.unshift(id);                        // সবার সামনে (সবচেয়ে নতুন) বসানো
    if (history.length > 200) history = history.slice(0, 200); // বেশি বড় হয়ে যাওয়া আটকানো
    localStorage.setItem('visitHistory', JSON.stringify(history));
  }

  function goBack() {
    if (document.referrer) {
      history.back();
    } else {
      window.location.href = "index.html?app=1";
    }
  }
</script>

</body>
</html>
