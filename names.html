function renderNames(list) {
  let html = '<div class="search-box"><input class="search-input" id="searchInput" placeholder="নাম খুঁজুন (আরবি, বাংলা, ইংরেজি বা নম্বর)..."></div>';
  html += '<div class="intro-box"><div class="ar-big">وَلِلَّهِ الْأَسْمَاءُ الْحُسْنَىٰ فَادْعُوهُ بِهَا</div><div class="sub">\u0022আর আল্লাহর জন্যই রয়েছে সবচেয়ে সুন্দর নামসমূহ; কাজেই তোমরা সেগুলো দ্বারা তাঁকে ডাকো।\u0022 — সূরা আল-আ\u2019রাফ ৭:১৮০</div></div>';
  html += '<div class="names-list" id="namesListBox"></div>';
  pageBody.innerHTML = html;

  const listBox = document.getElementById('namesListBox');
  function draw(items) {
    if (!items.length) {
      listBox.innerHTML = '<div class="state-box">কোনো নাম পাওয়া যায়নি।</div>';
      return;
    }
    listBox.innerHTML = items.map(function (item) {
      return '<div class="name-card">' +
        '<div class="name-num-badge">' + item.n + '</div>' +
        '<div class="name-body">' +
          '<div class="name-ar">' + item.ar + '</div>' +
          '<div class="name-translit">' + item.translit + '</div>' +
          '<div class="name-bn">' + item.bn + '</div>' +
          '<div class="name-en">' + item.en + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }
  draw(list);

  document.getElementById('searchInput').addEventListener('input', function (e) {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { draw(list); return; }
    draw(list.filter(function (item) {
      return item.translit.toLowerCase().includes(q) ||
        item.en.toLowerCase().includes(q) ||
        item.bn.includes(q) ||
        item.ar.includes(q) ||
        String(item.n) === q;
    }));
  });
}

renderNames(NAMES);
</script>
