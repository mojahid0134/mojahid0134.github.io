<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al-Quran</title>

<link rel="preconnect" href="https://api.alquran.cloud" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;600&display=swap" rel="stylesheet">

<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Roboto, sans-serif; }
  html, body { height:100%; background:#f4f5f7; }

  .topbar {
    background:linear-gradient(135deg,#2a1650,#4a2a6d);
    color:#fff; padding:14px 16px; display:flex; align-items:center; gap:12px;
    position:fixed; top:0; left:0; right:0; height:52px; z-index:20;
  }
  .back-btn {
    background:rgba(255,255,255,0.15); border:none; color:#fff;
    width:34px; height:34px; border-radius:50%; font-size:18px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .page-title { font-size:16px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .page-body { position:fixed; top:52px; left:0; right:0; bottom:0; overflow-y:auto; -webkit-overflow-scrolling:touch; }

  /* ===== Surah list screen ===== */
  .search-box { padding:12px 16px; background:#f4f5f7; position:sticky; top:0; z-index:5; }
  .search-input {
    width:100%; padding:11px 14px; border-radius:14px; border:none;
    background:#fff; box-shadow:0 1px 4px rgba(0,0,0,0.08); font-size:14px; color:#1a1a2e;
  }
  .surah-list { padding:4px 16px 24px; }
  .surah-card {
    display:flex; align-items:center; gap:12px; background:#fff; border-radius:14px;
    padding:12px 14px; margin-bottom:10px; box-shadow:0 1px 4px rgba(0,0,0,0.06);
  }
  .surah-num {
    width:38px; height:38px; border-radius:11px; background:linear-gradient(135deg,#2a1650,#4a2a6d);
    color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0;
  }
  .surah-info { flex:1; min-width:0; }
  .surah-en { font-weight:700; color:#1a1a2e; font-size:15px; }
  .surah-sub { color:#888; font-size:12px; margin-top:2px; }
  .surah-ar { font-family:'Amiri','Noto Naskh Arabic',serif; font-size:22px; color:#2a1650; flex-shrink:0; }

  /* ===== Surah detail screen ===== */
  .surah-header {
    background:linear-gradient(135deg,#2a1650,#4a2a6d); color:#fff;
    text-align:center; padding:22px 16px 20px; margin-bottom:14px;
  }
  .surah-header .ar-name { font-family:'Amiri','Noto Naskh Arabic',serif; font-size:34px; margin-bottom:6px; }
  .surah-header .en-name { font-size:15px; font-weight:700; }
  .surah-header .meta { font-size:12px; color:#d9c9f7; margin-top:4px; }
  .bismillah {
    text-align:center; font-family:'Amiri','Noto Naskh Arabic',serif; font-size:26px;
    color:#2a1650; padding:6px 16px 18px;
  }

  .ayah-block { background:#fff; margin:0 12px 12px; border-radius:16px; padding:16px 16px 14px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .ayah-num-badge {
    display:inline-flex; align-items:center; justify-content:center;
    width:26px; height:26px; border-radius:50%; background:#eeeafc; color:#4a2a8d;
    font-size:12px; font-weight:700; margin-bottom:10px;
  }
  .ayah-arabic {
    font-family:'Amiri','Noto Naskh Arabic',serif; font-size:24px; line-height:2.1;
    direction:rtl; text-align:right; color:#1a1a2e; margin-bottom:12px;
  }
  .ayah-bn { font-size:15px; line-height:1.8; color:#2a1650; margin-bottom:8px; }
  .ayah-bn::before { content:"বাংলা: "; font-weight:700; color:#8a5a2e; }
  .ayah-en { font-size:13.5px; line-height:1.7; color:#555; font-style:italic; }
  .ayah-en::before { content:"English: "; font-weight:700; font-style:normal; color:#888; }

  .state-box { text-align:center; padding:60px 24px; color:#888; font-size:14px; line-height:1.7; }
  .state-box button {
    margin-top:14px; background:#2a1650; color:#fff; border:none; padding:10px 22px;
    border-radius:20px; font-size:13px; font-weight:600;
  }
  .spinner {
    width:34px; height:34px; border:3px solid #ddd; border-top-color:#4a2a6d; border-radius:50%;
    margin:0 auto 14px; animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  .offline-tag { display:inline-block; background:#eafaf0; color:#1e8a5f; font-size:11px; font-weight:700; padding:3px 10px; border-radius:10px; margin-top:6px; }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" id="backBtn">←</button>
  <div class="page-title" id="pageTitle">Al-Quran</div>
</div>
<div class="page-body" id="pageBody"></div>

<script>
window.addEventListener('pageshow', function(event) { if (event.persisted) window.location.reload(); });

const params = new URLSearchParams(window.location.search);
const isAppMode = params.get('app') === '1';
const surahParam = params.get('surah');

const API_BASE = 'https://api.alquran.cloud/v1';
const EDITIONS = 'quran-uthmani,bn.bengali,en.sahih';
const LIST_CACHE_KEY = 'quran_surah_list_v1';
const surahCacheKey = n => 'quran_surah_data_v1_' + n;

const pageBody = document.getElementById('pageBody');
const pageTitle = document.getElementById('pageTitle');
const backBtn = document.getElementById('backBtn');

function goHome() { window.location.href = 'index.html' + (isAppMode ? '?app=1' : ''); }
function goList() { window.location.href = 'quran.html' + (isAppMode ? '?app=1' : ''); }

backBtn.addEventListener('click', function () {
  if (surahParam) goList(); else goHome();
});

function showLoading(msg) {
  pageBody.innerHTML = '<div class="state-box"><div class="spinner"></div>' + msg + '</div>';
}
function showError(msg, retryFn) {
  const box = document.createElement('div');
  box.className = 'state-box';
  box.innerHTML = msg + '<br><button id="retryBtn">আবার চেষ্টা করুন</button>';
  pageBody.innerHTML = '';
  pageBody.appendChild(box);
  document.getElementById('retryBtn').addEventListener('click', retryFn);
}

/* ============ SURAH LIST SCREEN ============ */
function renderSurahList(list, fromCache) {
  pageTitle.textContent = 'Al-Quran';
  let html = '<div class="search-box"><input class="search-input" id="searchInput" placeholder="সূরা খুঁজুন (নাম বা নম্বর)..."></div>';
  html += '<div class="surah-list" id="surahListBox"></div>';
  pageBody.innerHTML = html;

  const listBox = document.getElementById('surahListBox');
  function draw(items) {
    listBox.innerHTML = items.map(s => `
      <div class="surah-card" data-n="${s.number}">
        <div class="surah-num">${s.number}</div>
        <div class="surah-info">
          <div class="surah-en">${s.englishName}</div>
          <div class="surah-sub">${s.englishNameTranslation} · ${s.numberOfAyahs} Ayahs · ${s.revelationType}</div>
        </div>
        <div class="surah-ar">${s.name}</div>
      </div>
    `).join('');
    listBox.querySelectorAll('.surah-card').forEach(card => {
      card.addEventListener('click', () => {
        window.location.href = 'quran.html?surah=' + card.getAttribute('data-n') + (isAppMode ? '&app=1' : '');
      });
    });
  }
  draw(list);

  document.getElementById('searchInput').addEventListener('input', function (e) {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { draw(list); return; }
    draw(list.filter(s =>
      s.englishName.toLowerCase().includes(q) ||
      s.englishNameTranslation.toLowerCase().includes(q) ||
      String(s.number) === q ||
      s.name.includes(q)
    ));
  });
}

function loadSurahList() {
  const cached = localStorage.getItem(LIST_CACHE_KEY);
  if (cached) {
    try { renderSurahList(JSON.parse(cached), true); return; } catch (e) {}
  }
  showLoading('সূরার তালিকা লোড হচ্ছে...');
  fetch(API_BASE + '/surah')
    .then(r => r.json())
    .then(json => {
      if (!json.data) throw new Error('bad response');
      localStorage.setItem(LIST_CACHE_KEY, JSON.stringify(json.data));
      renderSurahList(json.data, false);
    })
    .catch(() => {
      showError('তালিকা লোড করা যায়নি। ইন্টারনেট সংযোগ চেক করুন।', loadSurahList);
    });
}

/* ============ SURAH DETAIL SCREEN ============ */
function renderSurahDetail(editions, fromCache) {
  const ar = editions.find(e => e.edition.identifier === 'quran-uthmani');
  const bn = editions.find(e => e.edition.identifier === 'bn.bengali');
  const en = editions.find(e => e.edition.identifier === 'en.sahih');

  pageTitle.textContent = ar.number + '. ' + ar.englishName;

  let html = `
    <div class="surah-header">
      <div class="ar-name">${ar.name}</div>
      <div class="en-name">${ar.englishName} — ${ar.englishNameTranslation}</div>
      <div class="meta">${ar.numberOfAyahs} Ayahs · ${ar.revelationType}${fromCache ? '<br><span class="offline-tag">📥 Offline এ সংরক্ষিত</span>' : ''}</div>
    </div>
  `;

  if (ar.number !== 1 && ar.number !== 9) {
    html += '<div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>';
  }

  ar.ayahs.forEach((ayah, i) => {
    const bnText = bn.ayahs[i] ? bn.ayahs[i].text : '';
    const enText = en.ayahs[i] ? en.ayahs[i].text : '';
    html += `
      <div class="ayah-block">
        <div class="ayah-num-badge">${ayah.numberInSurah}</div>
        <div class="ayah-arabic">${ayah.text}</div>
        <div class="ayah-bn">${bnText}</div>
        <div class="ayah-en">${enText}</div>
      </div>
    `;
  });

  pageBody.innerHTML = html;
  pageBody.scrollTop = 0;
}

function loadSurahDetail(n) {
  const cacheKey = surahCacheKey(n);
  const cached = localStorage.getItem(cacheKey);
  if (cached) {
    try { renderSurahDetail(JSON.parse(cached), true); return; } catch (e) {}
  }
  showLoading('সূরা লোড হচ্ছে... (আরবি + বাংলা + English)');
  fetch(API_BASE + '/surah/' + n + '/editions/' + EDITIONS)
    .then(r => r.json())
    .then(json => {
      if (!json.data || json.data.length < 3) throw new Error('bad response');
      try { localStorage.setItem(cacheKey, JSON.stringify(json.data)); } catch (e) { /* storage full — still show it */ }
      renderSurahDetail(json.data, false);
    })
    .catch(() => {
      showError('এই সূরাটি লোড করা যায়নি। ইন্টারনেট সংযোগ চেক করে আবার চেষ্টা করুন।', () => loadSurahDetail(n));
    });
}

/* ============ INIT ============ */
if (surahParam) {
  loadSurahDetail(surahParam);
} else {
  loadSurahList();
}
</script>

</body>
</html>
