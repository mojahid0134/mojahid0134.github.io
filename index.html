<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamFeed</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
  body { background:#f4f5f7; padding-bottom:30px; }

  .topbar {
    background: linear-gradient(135deg,#1A1A2E,#16213E);
    color:#fff; padding:14px 16px;
    display:flex; justify-content:space-between; align-items:center;
    position:sticky; top:0; z-index:100;
  }
  .topbar h1 { font-size:20px; letter-spacing:1px; }
  .timer { background:#0f3460; padding:6px 12px; border-radius:20px; font-size:13px; }

  .playlist-bar {
    display:flex; gap:10px; overflow-x:auto;
    padding:14px 12px; background:#fff;
    border-bottom:1px solid #eee;
  }
  .playlist-chip {
    flex-shrink:0; background:#eef1ff; color:#1A1A2E;
    padding:10px 18px; border-radius:20px; font-size:14px; font-weight:600;
    white-space:nowrap; cursor:pointer; border:1px solid #d8def7;
  }
  .playlist-chip.active { background:#1A1A2E; color:#fff; }

  .feed { padding:14px; display:flex; flex-direction:column; gap:14px; }
  .post-card {
    background:#fff; border-radius:14px; padding:16px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
  }
  .post-time { font-size:12px; color:#999; margin-bottom:6px; }
  .post-link {
    display:block; color:#0f3460; font-size:16px; font-weight:600;
    text-decoration:none; line-height:1.4;
  }
  .post-link:active { opacity:0.7; }

  .post-footer {
    display:flex; justify-content:flex-end; margin-top:10px;
  }
  .share-btn {
    background:#eef1ff; color:#1A1A2E; border:none;
    padding:7px 14px; border-radius:16px; font-size:13px; font-weight:600;
    display:flex; align-items:center; gap:5px;
  }

  .empty-msg { text-align:center; color:#999; padding:40px 0; }
</style>
</head>
<body>

  <div class="topbar">
    <h1 id="appTitle">StreamFeed</h1>
    <div class="timer" id="sessionTimer">00:00</div>
  </div>

  <div class="playlist-bar" id="playlistBar">
    <div class="playlist-chip active" onclick="showAllPosts()">Your Feeds</div>
    <div class="playlist-chip" onclick="showHistory()">History</div>
  </div>

  <div class="feed" id="feedContainer">
    <div class="empty-msg">Loading posts...</div>
  </div>

<script>
  window.addEventListener('pageshow', function(event) {
    if (event.persisted) {
      window.location.reload();
    }
  });

  const APP_NAME = "StreamFeed";
  document.getElementById('appTitle').innerText = APP_NAME;
  document.title = APP_NAME;

  const firebaseConfig = {
    apiKey: "AIzaSyAJLBtnX05B7t8XGJljMJBHSW0OoWEM7xs",
    authDomain: "streamfeedapp.firebaseapp.com",
    projectId: "streamfeedapp",
    storageBucket: "streamfeedapp.firebasestorage.app",
    messagingSenderId: "255931584141",
    appId: "1:255931584141:web:9d62d1759e4ee8f280dcc4"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let allPosts = [];
  let allPlaylists = [];
  let currentFilter = { type: 'all' };
  const APP_MODE = new URLSearchParams(window.location.search).get('app') === '1';

  const CACHE_POSTS_KEY = 'cachedPostsData';
  const CACHE_PLAYLISTS_KEY = 'cachedPlaylistsData';

  // ---- Session Timer ----
  let seconds = parseInt(sessionStorage.getItem('appTimerSeconds') || '0', 10);
  let timerInterval = null;

  function updateTimerDisplay() {
    const m = String(Math.floor(seconds/60)).padStart(2,'0');
    const s = String(seconds%60).padStart(2,'0');
    document.getElementById('sessionTimer').innerText = m+":"+s;
  }
  updateTimerDisplay();

  function startTimer() {
    if (timerInterval) return;
    timerInterval = setInterval(() => {
      seconds++;
      sessionStorage.setItem('appTimerSeconds', seconds);
      updateTimerDisplay();
    }, 1000);
  }
  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) stopTimer(); else startTimer();
  });
  startTimer();

  // ---- Posts আঁকা ----
  function renderPosts(posts) {
    const feed = document.getElementById('feedContainer');
    if (posts.length === 0) {
      feed.innerHTML = '<div class="empty-msg">No posts yet</div>';
      return;
    }
    feed.innerHTML = "";
    posts.forEach(post => {
      const card = document.createElement('div');
      card.className = 'post-card';
      card.innerHTML = `
        <div class="post-time">${post.timeText || ''}</div>
        <a class="post-link" href="view.html?url=${encodeURIComponent(post.link)}&title=${encodeURIComponent(post.customText)}&id=${post.id}${APP_MODE ? '&app=1' : ''}">${post.customText}</a>
        <div class="post-footer">
          <button class="share-btn" onclick="sharePost('${post.id}')">🔗 Share</button>
        </div>
      `;
      feed.appendChild(card);
    });
  }

  // ---- Playlist Chip গুলো আঁকা ----
  function renderPlaylistChips(playlists) {
    const bar = document.getElementById('playlistBar');
    // প্রথম দুইটা (Your Feeds, History) রেখে বাকি পুরনো Chip মুছে ফেলা
    while (bar.children.length > 2) {
      bar.removeChild(bar.lastChild);
    }
    playlists.forEach(pl => {
      const chip = document.createElement('div');
      chip.className = 'playlist-chip';
      chip.innerText = pl.name || 'Playlist';
      chip.setAttribute('data-playlist-id', pl.id);
      chip.onclick = () => filterByPlaylist(pl.id);
      bar.appendChild(chip);
    });
  }

  // ---- বর্তমান Filter অনুযায়ী Feed দেখানো ----
  function applyFilterState() {
    document.querySelectorAll('.playlist-chip').forEach(c => c.classList.remove('active'));
    const chips = document.querySelectorAll('.playlist-chip');

    if (currentFilter.type === 'all') {
      chips[0].classList.add('active');
      renderPosts(allPosts);
    } else if (currentFilter.type === 'history') {
      chips[1].classList.add('active');
      const historyIds = JSON.parse(localStorage.getItem('visitHistory') || '[]');
      const historyPosts = historyIds.map(id => allPosts.find(p => p.id === id)).filter(p => p);
      renderPosts(historyPosts);
    } else if (currentFilter.type === 'playlist') {
      const chip = document.querySelector(`.playlist-chip[data-playlist-id="${currentFilter.id}"]`);
      if (chip) chip.classList.add('active');
      renderPosts(allPosts.filter(p => p.playlistId === currentFilter.id));
    }
  }

  function showAllPosts() { currentFilter = { type: 'all' }; applyFilterState(); }
  function showHistory() { currentFilter = { type: 'history' }; applyFilterState(); }
  function filterByPlaylist(playlistId) { currentFilter = { type: 'playlist', id: playlistId }; applyFilterState(); }

  function sharePost(postId) {
    const post = allPosts.find(p => p.id === postId);
    if (!post) return;
    const shareUrl = window.location.origin + "/view.html?url=" + encodeURIComponent(post.link) + "&title=" + encodeURIComponent(post.customText);
    if (navigator.share) {
      navigator.share({ title: post.customText, url: shareUrl }).catch(() => {});
    } else {
      navigator.clipboard.writeText(shareUrl).then(() => alert('Link copied to clipboard!'));
    }
  }

  // ---- ধাপ ১: আগে Cache থেকে সাথে সাথে দেখানো (Loading ছাড়াই) ----
  try {
    const cachedPosts = JSON.parse(localStorage.getItem(CACHE_POSTS_KEY) || 'null');
    const cachedPlaylists = JSON.parse(localStorage.getItem(CACHE_PLAYLISTS_KEY) || 'null');
    if (cachedPosts) {
      allPosts = cachedPosts;
      renderPosts(allPosts);
    }
    if (cachedPlaylists) {
      allPlaylists = cachedPlaylists;
      renderPlaylistChips(allPlaylists);
    }
  } catch (e) {}

  // ---- ধাপ ২: Background এ Firestore থেকে আসল/নতুন Data আনা ----
  const sharedPlaylistId = new URLSearchParams(window.location.search).get('playlist');

  db.collection('posts').orderBy('time','desc').get().then(snapshot => {
    const freshPosts = [];
    snapshot.forEach(doc => {
      const data = doc.data();
      freshPosts.push({
        id: doc.id,
        customText: data.customText || 'Untitled Post',
        link: data.link || '',
        playlistId: data.playlistId || '',
        timeText: data.timeText || ''
      });
    });
    allPosts = freshPosts;
    localStorage.setItem(CACHE_POSTS_KEY, JSON.stringify(freshPosts));
    applyFilterState();
  }).catch(err => {
    if (allPosts.length === 0) {
      document.getElementById('feedContainer').innerHTML =
        '<div class="empty-msg">Error loading posts: '+err.message+'</div>';
    }
  });

  db.collection('playlists').get().then(snapshot => {
    const freshPlaylists = [];
    snapshot.forEach(doc => {
      freshPlaylists.push({ id: doc.id, name: doc.data().name || 'Playlist' });
    });
    allPlaylists = freshPlaylists;
    localStorage.setItem(CACHE_PLAYLISTS_KEY, JSON.stringify(freshPlaylists));
    renderPlaylistChips(allPlaylists);

    if (sharedPlaylistId) {
      currentFilter = { type: 'playlist', id: sharedPlaylistId };
    }
    applyFilterState();
  });
</script>

</body>
</html>
